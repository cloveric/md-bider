<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>md-bider</title>
  <style>
    :root {
      --bg: #e7ebf3;
      --toolbar-bg: linear-gradient(180deg, #f8f9fc 0%, #edf1f7 100%);
      --toolbar-border: #ccd4e4;
      --surface: #ffffff;
      --text: #1f2a37;
      --muted: #5a6778;
      --primary: #2c5fcb;
      --primary-hover: #224fae;
      --danger: #b73434;
      --tab-strip-bg: #e4e9f2;
      --tab-bg: #dde4f0;
      --tab-border: #bcc6d8;
      --tab-hover: #edf2fa;
      --tab-active: #ffffff;
      --btn-bg: #f7f9fc;
      --btn-border: #bcc6d8;
      --btn-shadow: 0 1px 0 rgba(255, 255, 255, 0.9) inset;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px 9px;
      border-bottom: 1px solid var(--toolbar-border);
      background: var(--toolbar-bg);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.75) inset;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .toolbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .btn {
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: #1f2f45;
      border-radius: 10px;
      padding: 0 14px;
      min-height: 34px;
      font-size: 13px;
      line-height: 1;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--btn-shadow);
      transition: background-color 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
    }
    .btn:hover {
      background: #ffffff;
      border-color: #aebad0;
    }
    .btn:active {
      transform: translateY(1px);
    }
    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.2) inset;
    }
    .btn.primary:hover {
      background: var(--primary-hover);
    }
    .btn.mode {
      min-width: 90px;
      border-radius: 8px;
      min-height: 30px;
      padding: 0 12px;
      font-weight: 500;
    }
    .mode-group {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #c7d0df;
      border-radius: 10px;
      padding: 2px;
      background: #eef2f8;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }
    .btn.mode {
      border-color: transparent;
      background: transparent;
      box-shadow: none;
    }
    .btn.mode:hover {
      background: #e3e9f4;
      border-color: transparent;
    }
    .btn.mode.active {
      border-color: #b5c2da;
      color: #1b4ea5;
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(60, 85, 130, 0.1);
    }
    .path {
      color: #51617a;
      font-size: 12px;
      max-width: 36vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 8px;
      border-radius: 8px;
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid #d3dbe9;
    }
    .status {
      font-size: 12px;
      color: var(--muted);
      padding: 0 2px;
    }
    .status.error {
      color: var(--danger);
    }
    .lang-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      min-height: 28px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid #d3dbe9;
    }
    .lang-label {
      font-size: 12px;
      color: #51617a;
    }
    .lang-select {
      min-height: 24px;
      border-radius: 6px;
      border: 1px solid #bcc6d8;
      background: #ffffff;
      color: #1f2f45;
      font-size: 12px;
      padding: 0 6px;
      outline: none;
    }
    .lang-select:focus {
      border-color: #6e8bc8;
      box-shadow: 0 0 0 2px rgba(110, 139, 200, 0.2);
    }
    .tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px 0;
      border-bottom: 1px solid var(--toolbar-border);
      background: var(--tab-strip-bg);
      overflow-x: auto;
      white-space: nowrap;
    }
    .tabs:empty {
      padding: 0;
      border-bottom: 0;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      height: 32px;
      max-width: 260px;
      background: var(--tab-bg);
      border: 1px solid var(--tab-border);
      border-bottom: 1px solid var(--toolbar-border);
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      padding: 5px 10px;
      cursor: pointer;
      color: #2a3850;
      user-select: none;
      transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }
    .tab:hover {
      background: var(--tab-hover);
    }
    .tab.active {
      background: var(--tab-active);
      border-color: var(--toolbar-border);
      border-bottom-color: var(--tab-active);
      color: #1d4fa5;
      margin-bottom: -1px;
    }
    .tab-title {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 210px;
      font-size: 12px;
    }
    .tab-close {
      margin-left: 6px;
      border: 0;
      border-radius: 4px;
      width: 16px;
      height: 16px;
      line-height: 14px;
      background: transparent;
      color: #6a788c;
      cursor: pointer;
      font-size: 11px;
      padding: 0;
    }
    .tab-close:hover {
      background: #dbe3f3;
      color: #243246;
    }
    .editor-wrap {
      padding: 10px;
      flex: 1;
      min-height: 0;
    }
    #editorRoot {
      height: 100%;
      border: 1px solid var(--toolbar-border);
      border-radius: 12px;
      background: var(--surface);
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(42, 68, 110, 0.09);
    }
  </style>
</head>
<body>
    <div id="app">
    <div class="toolbar">
      <div class="toolbar-left">
        <button id="newBtn" class="btn">新建</button>
        <button id="openBtn" class="btn">打开</button>
        <button id="saveBtn" class="btn primary">保存</button>
        <button id="saveAsBtn" class="btn">另存为</button>
        <div class="mode-group">
          <button id="svBtn" class="btn mode">分栏 SV</button>
          <button id="irBtn" class="btn mode">所见即所得 IR</button>
          <button id="wysiwygBtn" class="btn mode">富文本 WYSIWYG</button>
        </div>
      </div>
      <div class="toolbar-right">
        <label class="lang-wrap" for="langSelect">
          <span id="langLabel" class="lang-label">语言</span>
          <select id="langSelect" class="lang-select">
            <option value="zh-CN">中文</option>
            <option value="en">English</option>
          </select>
        </label>
        <span id="filePath" class="path">未打开文件</span>
        <span id="status" class="status">准备中...</span>
      </div>
    </div>
    <div id="tabs" class="tabs"></div>
    <div class="editor-wrap">
      <div id="editorRoot"></div>
    </div>
  </div>
  <script>
    let editor = null;
    let currentMode = "ir";
    let readySent = false;
    let engineBooted = false;
    let engineError = "";
    let suppressEditorInput = false;
    let tabSeq = 0;
    let activeTabId = "";

    const tabs = [];
    const untitledIndexPool = new Set();
    const statusEl = document.getElementById("status");
    const pathEl = document.getElementById("filePath");
    const tabsEl = document.getElementById("tabs");
    const langLabelEl = document.getElementById("langLabel");
    const langSelectEl = document.getElementById("langSelect");
    const modeButtons = {
      sv: document.getElementById("svBtn"),
      ir: document.getElementById("irBtn"),
      wysiwyg: document.getElementById("wysiwygBtn"),
    };
    const ENGINE_GLOBAL = String.fromCharCode(86, 100, 105, 116, 111, 114);
    const ENGINE_I18N_GLOBAL = String.fromCharCode(86, 100, 105, 116, 111, 114, 73, 49, 56, 110);
    const ENGINE_ICON_GLOBAL = String.fromCharCode(86, 100, 105, 116, 111, 114, 83, 118, 103, 115);
    const ENGINE_JS_B64 = window.__ENGINE_JS_B64__ || "";
    const ENGINE_CSS_B64 = window.__ENGINE_CSS_B64__ || "";
    const ENGINE_ICON_B64 = window.__ENGINE_ICON_B64__ || "";
    const ENGINE_I18N_B64 = window.__ENGINE_I18N_B64__ || "";
    const APP_LOCALE_KEY = "md-bider.locale";
    const UNTITLED_PREFIX_BY_LOCALE = {
      "zh-CN": "未命名 ",
      en: "Untitled ",
    };
    const UI_TEXT = {
      "zh-CN": {
        language: "语言",
        chinese: "中文",
        english: "English",
        new: "新建",
        open: "打开",
        save: "保存",
        saveAs: "另存为",
        modeSv: "分栏 SV",
        modeIr: "所见即所得 IR",
        modeWysiwyg: "富文本 WYSIWYG",
        pathNotOpened: "未打开文件",
        closeTab: "关闭标签",
        closeUnsavedConfirm: "标签“{title}”尚未保存，确定关闭吗？",
        statusPreparing: "准备中...",
        statusSwitchTab: "已切换标签",
        statusCloseTab: "已关闭标签",
        statusEditing: "编辑中",
        statusReady: "就绪",
        statusNewTab: "新建标签",
        statusFileOpened: "文件已打开",
        statusNewFile: "新建文件",
        statusSaved: "保存成功",
        statusModeSwitch: "切换模式: {mode}",
        statusLanguageSwitch: "界面语言: 中文",
        statusEditorLoadError: "编辑引擎未加载: {reason}",
        statusEditorUnavailable: "编辑引擎未加载。",
        statusUnknownError: "未知错误",
        statusGenericError: "发生错误",
      },
      en: {
        language: "Language",
        chinese: "Chinese",
        english: "English",
        new: "New",
        open: "Open",
        save: "Save",
        saveAs: "Save As",
        modeSv: "Split SV",
        modeIr: "Instant IR",
        modeWysiwyg: "Rich Text WYSIWYG",
        pathNotOpened: "No file opened",
        closeTab: "Close tab",
        closeUnsavedConfirm: "Tab \"{title}\" has unsaved changes. Close anyway?",
        statusPreparing: "Preparing...",
        statusSwitchTab: "Switched tab",
        statusCloseTab: "Closed tab",
        statusEditing: "Editing",
        statusReady: "Ready",
        statusNewTab: "New tab",
        statusFileOpened: "File opened",
        statusNewFile: "New file",
        statusSaved: "Saved",
        statusModeSwitch: "Mode switched: {mode}",
        statusLanguageSwitch: "Language: English",
        statusEditorLoadError: "Editor engine not loaded: {reason}",
        statusEditorUnavailable: "Editor engine is unavailable.",
        statusUnknownError: "Unknown error",
        statusGenericError: "An error occurred",
      },
    };

    function normalizeLocale(locale) {
      const raw = String(locale || "").trim().toLowerCase();
      return raw.startsWith("zh") ? "zh-CN" : "en";
    }

    function readStoredLocale() {
      try {
        return window.localStorage.getItem(APP_LOCALE_KEY) || "";
      } catch (_) {
        return "";
      }
    }

    function saveStoredLocale(locale) {
      try {
        window.localStorage.setItem(APP_LOCALE_KEY, locale);
      } catch (_) {
        // ignore storage failures (private mode / policy)
      }
    }

    let appLocale = normalizeLocale(readStoredLocale() || document.documentElement.lang || navigator.language);

    function textTable() {
      return UI_TEXT[appLocale] || UI_TEXT["zh-CN"];
    }

    function untitledPrefix() {
      return UNTITLED_PREFIX_BY_LOCALE[appLocale] || UNTITLED_PREFIX_BY_LOCALE["zh-CN"];
    }

    function t(key, vars = {}) {
      const template = textTable()[key] || key;
      return String(template).replace(/\{(\w+)\}/g, (_all, token) => {
        return Object.prototype.hasOwnProperty.call(vars, token) ? String(vars[token]) : "";
      });
    }

    function hostSend(message) {
      if (window.ipc && typeof window.ipc.postMessage === "function") {
        window.ipc.postMessage(JSON.stringify(message));
      }
    }

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle("error", isError);
    }

    function setPath(path) {
      pathEl.textContent = path || t("pathNotOpened");
      pathEl.title = pathEl.textContent;
    }

    function refreshUntitledTabTitles() {
      const prefix = untitledPrefix();
      tabs.forEach((tab) => {
        if (Number.isInteger(tab.untitledIndex) && tab.untitledIndex > 0) {
          tab.title = `${prefix}${tab.untitledIndex}`;
        }
      });
    }

    function applyUiLanguage() {
      document.documentElement.lang = appLocale;
      document.getElementById("newBtn").textContent = t("new");
      document.getElementById("openBtn").textContent = t("open");
      document.getElementById("saveBtn").textContent = t("save");
      document.getElementById("saveAsBtn").textContent = t("saveAs");
      modeButtons.sv.textContent = t("modeSv");
      modeButtons.ir.textContent = t("modeIr");
      modeButtons.wysiwyg.textContent = t("modeWysiwyg");
      langLabelEl.textContent = t("language");
      langSelectEl.options[0].textContent = t("chinese");
      langSelectEl.options[1].textContent = t("english");
      langSelectEl.value = appLocale;
      refreshUntitledTabTitles();
      renderTabs();
      const active = getActiveTab();
      setPath(active?.path || "");
    }

    function setLocale(locale, { announce = true, recreateEditor = true } = {}) {
      const next = normalizeLocale(locale);
      if (next === appLocale) {
        return;
      }
      appLocale = next;
      saveStoredLocale(appLocale);
      applyUiLanguage();
      if (recreateEditor && editor) {
        persistActiveTabContent();
        createEditor(getActiveTab()?.content || "");
      }
      if (announce) {
        setStatus(t("statusLanguageSwitch"));
      }
    }

    function updateModeButtons() {
      Object.entries(modeButtons).forEach(([mode, btn]) => {
        btn.classList.toggle("active", mode === currentMode);
      });
    }

    function decodeBase64Utf8(input) {
      const raw = atob(input);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i += 1) {
        bytes[i] = raw.charCodeAt(i);
      }
      return new TextDecoder("utf-8").decode(bytes);
    }

    function evalBase64Script(input) {
      if (!input) {
        return;
      }
      const scriptText = decodeBase64Utf8(input);
      (0, eval)(scriptText);
    }

    function ensureEngineLoaded() {
      if (window[ENGINE_GLOBAL]) {
        return true;
      }
      if (engineBooted) {
        return !!window[ENGINE_GLOBAL];
      }

      try {
        if (!ENGINE_JS_B64 || !ENGINE_CSS_B64) {
          engineError = appLocale === "en" ? "embedded assets are missing" : "内嵌资源未注入";
          return false;
        }
        const cssText = decodeBase64Utf8(ENGINE_CSS_B64);
        if (!document.getElementById("engine-style")) {
          const style = document.createElement("style");
          style.id = "engine-style";
          style.textContent = cssText;
          document.head.appendChild(style);
        }

        if (!window[ENGINE_I18N_GLOBAL]) {
          evalBase64Script(ENGINE_I18N_B64);
        }
        if (!window[ENGINE_ICON_GLOBAL]) {
          evalBase64Script(ENGINE_ICON_B64);
        }

        const jsText = decodeBase64Utf8(ENGINE_JS_B64);
        (0, eval)(jsText);
        engineBooted = true;
      } catch (error) {
        engineError = error instanceof Error ? error.message : String(error);
        return false;
      }

      return !!window[ENGINE_GLOBAL];
    }

    function basename(path) {
      if (!path) {
        return "";
      }
      const normalized = String(path).replaceAll("\\", "/");
      const parts = normalized.split("/").filter(Boolean);
      return parts.length > 0 ? parts[parts.length - 1] : "";
    }

    function nextTabId() {
      tabSeq += 1;
      return `tab-${tabSeq}`;
    }

    function syncTabSeqFromId(tabId) {
      const match = /^tab-(\d+)$/.exec(tabId || "");
      if (!match) {
        return;
      }
      const numericId = Number(match[1]);
      if (Number.isFinite(numericId)) {
        tabSeq = Math.max(tabSeq, numericId);
      }
    }

    function parseUntitledIndex(title) {
      const normalizedTitle = String(title || "").trim();
      const prefixes = Object.values(UNTITLED_PREFIX_BY_LOCALE);
      for (const prefix of prefixes) {
        if (!normalizedTitle.startsWith(prefix)) {
          continue;
        }
        const suffix = normalizedTitle.slice(prefix.length).trim();
        if (/^\d+$/.test(suffix)) {
          return Number(suffix);
        }
      }
      return null;
    }

    function acquireUntitledIndex(preferred = null) {
      if (Number.isInteger(preferred) && preferred > 0 && !untitledIndexPool.has(preferred)) {
        untitledIndexPool.add(preferred);
        return preferred;
      }

      let index = 1;
      while (untitledIndexPool.has(index)) {
        index += 1;
      }
      untitledIndexPool.add(index);
      return index;
    }

    function releaseUntitledIndex(index) {
      if (Number.isInteger(index) && index > 0) {
        untitledIndexPool.delete(index);
      }
    }

    function ensureUntitledTitle(tab, preferredTitle = "") {
      const prefix = untitledPrefix();
      if (Number.isInteger(tab.untitledIndex) && tab.untitledIndex > 0) {
        untitledIndexPool.add(tab.untitledIndex);
        tab.title = `${prefix}${tab.untitledIndex}`;
        return;
      }

      const preferredIndex = parseUntitledIndex(preferredTitle) ?? parseUntitledIndex(tab.title);
      const index = acquireUntitledIndex(preferredIndex);
      tab.untitledIndex = index;
      tab.title = `${prefix}${index}`;
    }

    function applyTabPath(tab, path, preferredTitle = "") {
      tab.path = path || "";
      const fileName = basename(tab.path);
      if (fileName) {
        releaseUntitledIndex(tab.untitledIndex);
        tab.untitledIndex = null;
        tab.title = fileName;
        return;
      }
      ensureUntitledTitle(tab, preferredTitle);
    }

    function getActiveTab() {
      return tabs.find((tab) => tab.id === activeTabId) || null;
    }

    function getEditorValue() {
      if (!editor) {
        return "";
      }
      return editor.getValue();
    }

    function persistActiveTabContent() {
      const active = getActiveTab();
      if (!active) {
        return;
      }
      active.content = getEditorValue();
    }

    function renderTabs() {
      tabsEl.innerHTML = "";
      tabs.forEach((tab) => {
        const tabEl = document.createElement("div");
        tabEl.className = `tab${tab.id === activeTabId ? " active" : ""}`;
        tabEl.dataset.tabId = tab.id;

        const titleEl = document.createElement("span");
        titleEl.className = "tab-title";
        const dirtyPrefix = tab.dirty ? "● " : "";
        titleEl.textContent = `${dirtyPrefix}${tab.title}`;
        titleEl.title = tab.path || tab.title;
        tabEl.appendChild(titleEl);

        const closeEl = document.createElement("button");
        closeEl.className = "tab-close";
        closeEl.textContent = "×";
        closeEl.title = t("closeTab");
        closeEl.addEventListener("click", (event) => {
          event.stopPropagation();
          closeTab(tab.id);
        });
        tabEl.appendChild(closeEl);

        tabEl.addEventListener("click", () => activateTab(tab.id));
        tabsEl.appendChild(tabEl);
      });
    }

    function setEditorContent(value) {
      if (!editor) {
        return;
      }
      suppressEditorInput = true;
      editor.setValue(value || "");
      suppressEditorInput = false;
    }

    function activateTab(tabId) {
      if (!tabId || tabId === activeTabId) {
        return;
      }
      persistActiveTabContent();
      activeTabId = tabId;
      const active = getActiveTab();
      renderTabs();
      if (active) {
        setPath(active.path || "");
        setEditorContent(active.content || "");
      }
      setStatus(t("statusSwitchTab"));
    }

    function addTab({ id, path = "", content = "", title = "", activate = true }) {
      syncTabSeqFromId(id);
      const tab = {
        id,
        path: "",
        title: "",
        content,
        dirty: false,
        untitledIndex: null,
      };
      applyTabPath(tab, path, title);
      tabs.push(tab);
      if (activate) {
        activeTabId = id;
      }
      renderTabs();
      if (activate) {
        setPath(path);
        if (editor) {
          setEditorContent(content);
        }
      }
      return tab;
    }

    function ensureOneTab() {
      if (tabs.length > 0) {
        return;
      }
      const tab = addTab({ id: nextTabId(), content: "", activate: true });
      setPath(tab.path);
    }

    function markActiveTabDirty() {
      const active = getActiveTab();
      if (!active) {
        return;
      }
      active.content = getEditorValue();
      active.dirty = true;
      renderTabs();
    }

    function closeTab(tabId) {
      const index = tabs.findIndex((tab) => tab.id === tabId);
      if (index === -1) {
        return;
      }
      const tab = tabs[index];
      if (tab.dirty) {
        const ok = window.confirm(t("closeUnsavedConfirm", { title: tab.title }));
        if (!ok) {
          return;
        }
      }
      releaseUntitledIndex(tab.untitledIndex);

      if (tabs.length === 1) {
        tabs[0] = {
          id: nextTabId(),
          path: "",
          title: "",
          content: "",
          dirty: false,
          untitledIndex: null,
        };
        ensureUntitledTitle(tabs[0], tab.title);
        activeTabId = tabs[0].id;
        renderTabs();
        setPath("");
        setEditorContent("");
        setStatus(t("statusCloseTab"));
        return;
      }

      tabs.splice(index, 1);
      if (activeTabId === tabId) {
        const fallbackIndex = Math.max(0, index - 1);
        activeTabId = tabs[fallbackIndex].id;
      }
      const active = getActiveTab();
      renderTabs();
      if (active) {
        setPath(active.path || "");
        setEditorContent(active.content || "");
      }
      setStatus(t("statusCloseTab"));
    }

    function upsertOpenedTab(tabId, path, content) {
      syncTabSeqFromId(tabId);
      const found = tabs.find((tab) => tab.id === tabId);
      if (found) {
        found.content = content || "";
        applyTabPath(found, path || "", found.title);
        found.dirty = false;
      } else {
        const tab = {
          id: tabId,
          path: "",
          content: content || "",
          title: "",
          dirty: false,
          untitledIndex: null,
        };
        applyTabPath(tab, path || "", "");
        tabs.push(tab);
      }
      activeTabId = tabId;
      renderTabs();
      const active = getActiveTab();
      if (active) {
        setPath(active.path || "");
        setEditorContent(active.content || "");
      }
    }

    function createEditor(value = "") {
      if (!ensureEngineLoaded()) {
        const reason = engineError || t("statusUnknownError");
        setStatus(t("statusEditorLoadError", { reason }), true);
        return;
      }
      const EditorCtor = window[ENGINE_GLOBAL];
      if (!EditorCtor) {
        setStatus(t("statusEditorUnavailable"), true);
        return;
      }

      const container = document.getElementById("editorRoot");
      container.innerHTML = "";
      const editorLang = appLocale === "en" ? "en" : "zh_CN";
      const editorI18n = appLocale === "en" ? undefined : window[ENGINE_I18N_GLOBAL];

      editor = new EditorCtor("editorRoot", {
        mode: currentMode,
        height: "100%",
        value,
        lang: editorLang,
        i18n: editorI18n,
        icon: "",
        toolbar: [
          "emoji",
          "headings",
          "bold",
          "italic",
          "strike",
          "|",
          "line",
          "quote",
          "list",
          "ordered-list",
          "check",
          "|",
          "code",
          "inline-code",
          "link",
          "table",
          "|",
          "undo",
          "redo",
          "|",
          "edit-mode",
          "both",
          "preview",
          "fullscreen"
        ],
        toolbarConfig: {
          pin: true,
          hide: false,
        },
        counter: {
          enable: true,
          type: "markdown",
        },
        cache: {
          enable: false,
        },
        preview: {
          markdown: {
            toc: true,
          },
        },
        input() {
          if (suppressEditorInput) {
            return;
          }
          markActiveTabDirty();
          setStatus(t("statusEditing"));
        },
        after() {
          updateModeButtons();
          if (!readySent) {
            hostSend({ cmd: "app_ready", tab_id: activeTabId || null });
            readySent = true;
          }
          setStatus(t("statusReady"));
        },
      });
    }

    function switchMode(mode) {
      if (!mode || mode === currentMode) {
        return;
      }
      persistActiveTabContent();
      currentMode = mode;
      createEditor(getActiveTab()?.content || "");
      setStatus(t("statusModeSwitch", { mode: mode.toUpperCase() }));
    }

    function requestOpenFile() {
      hostSend({ cmd: "open_file", tab_id: nextTabId() });
    }

    function requestSave(saveAs) {
      const active = getActiveTab();
      if (!active) {
        return;
      }
      persistActiveTabContent();
      const payload = {
        cmd: saveAs ? "save_as" : "save_file",
        tab_id: active.id,
        path: active.path || null,
        content: active.content || "",
      };
      hostSend(payload);
    }

    function translateHostMessage(message) {
      const source = String(message || "").trim();
      if (!source) {
        return source;
      }
      if (appLocale !== "en") {
        return source;
      }
      if (source === "编辑器已就绪") {
        return "Editor is ready";
      }
      if (source.startsWith("打开失败:")) {
        return `Open failed: ${source.slice("打开失败:".length).trim()}`;
      }
      if (source.startsWith("保存失败:")) {
        return `Save failed: ${source.slice("保存失败:".length).trim()}`;
      }
      if (source.startsWith("无法识别指令:")) {
        return `Unknown command: ${source.slice("无法识别指令:".length).trim()}`;
      }
      return source;
    }

    window.__HOST__ = {
      onMessage(message) {
        if (!message || !message.event) {
          return;
        }
        if (message.event === "file_opened") {
          const tabId = message.tab_id || nextTabId();
          upsertOpenedTab(tabId, message.path || "", message.content || "");
          setStatus(message.path ? t("statusFileOpened") : t("statusNewFile"));
          return;
        }
        if (message.event === "file_saved") {
          const target = tabs.find((tab) => tab.id === message.tab_id);
          if (target) {
            applyTabPath(target, message.path || target.path, target.title);
            target.dirty = false;
          }
          if (message.tab_id === activeTabId) {
            setPath(message.path || target?.path || "");
          }
          renderTabs();
          setStatus(t("statusSaved"));
          return;
        }
        if (message.event === "status") {
          const localized = translateHostMessage(message.message || "");
          setStatus(localized);
          return;
        }
        if (message.event === "error") {
          const fallback = t("statusGenericError");
          const localized = translateHostMessage(message.message || fallback);
          setStatus(localized || fallback, true);
        }
      },
    };

    document.getElementById("newBtn").addEventListener("click", () => {
      persistActiveTabContent();
      const tab = addTab({ id: nextTabId(), content: "", activate: true });
      setEditorContent(tab.content);
      setStatus(t("statusNewTab"));
    });
    document.getElementById("openBtn").addEventListener("click", () => {
      requestOpenFile();
    });
    document.getElementById("saveBtn").addEventListener("click", () => {
      requestSave(false);
    });
    document.getElementById("saveAsBtn").addEventListener("click", () => {
      requestSave(true);
    });
    modeButtons.sv.addEventListener("click", () => switchMode("sv"));
    modeButtons.ir.addEventListener("click", () => switchMode("ir"));
    modeButtons.wysiwyg.addEventListener("click", () => switchMode("wysiwyg"));
    langSelectEl.addEventListener("change", (event) => {
      const next = event?.target?.value || "zh-CN";
      setLocale(next, { announce: true, recreateEditor: true });
    });

    window.addEventListener("keydown", (event) => {
      const hotkey = event.ctrlKey || event.metaKey;
      if (!hotkey) {
        return;
      }
      const key = event.key.toLowerCase();
      if (key === "n") {
        event.preventDefault();
        document.getElementById("newBtn").click();
      } else if (key === "o") {
        event.preventDefault();
        requestOpenFile();
      } else if (key === "w") {
        event.preventDefault();
        closeTab(activeTabId);
      } else if (key === "s" && event.shiftKey) {
        event.preventDefault();
        requestSave(true);
      } else if (key === "s") {
        event.preventDefault();
        requestSave(false);
      }
    });

    applyUiLanguage();
    setStatus(t("statusPreparing"));
    ensureOneTab();
    updateModeButtons();
    createEditor(getActiveTab()?.content || "");
  </script>
</body>
</html>
